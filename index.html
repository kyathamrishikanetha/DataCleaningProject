<!DOCTYPE html>
<html>

<head>
    <title>Car Price Prediction</title>
</head>

<body>

    <h1>Car Price Prediction</h1>

    <form action="/predict" method="POST">

        <input type="number" name="year" placeholder="Year"><br><br>

        <input type="text" name="make" placeholder="Make"><br><br>

        <input type="text" name="model" placeholder="Model"><br><br>

        <input type="text" name="trim" placeholder="Trim"><br><br>

        <input type="text" name="body" placeholder="Body"><br><br>

        <input type="text" name="transmission" placeholder="Transmission"><br><br>

        <input type="text" name="vin" placeholder="VIN"><br><br>

        <input type="text" name="state" placeholder="State"><br><br>

        <input type="number" step="0.1" name="condition" placeholder="Condition"><br><br>

        <input type="number" name="odometer" placeholder="Odometer"><br><br>

        <input type="text" name="color" placeholder="Color"><br><br>

        <input type="text" name="interior" placeholder="Interior"><br><br>

        <input type="text" name="seller" placeholder="Seller"><br><br>

        <input type="number" name="mmr" placeholder="MMR"><br><br>

        <input type="text" name="saledate" placeholder="Sale Date"><br><br>

        <button type="submit">Predict Price</button>

    </form>

    <h2>{{ prediction_text }}</h2>

</body>
</html>
